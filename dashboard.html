<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EraScope - Research Portal</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    display: flex;
    height: 100vh;
    background: #f4f6f9;
}

/* Sidebar */
.sidebar {
    width: 60px;
    background: #88a1ec;
    padding-top: 20px;
    transition: 0.3s;
    overflow: hidden;
}

.sidebar.expand {
    width: 220px;
}

.toggle-btn {
    text-align: center;
    font-size: 22px;
    cursor: pointer;
    margin-bottom: 30px;
}

.menu {
    list-style: none;
    padding-left: 10px;
}

.menu li {
    padding: 12px;
    cursor: pointer;
    border-radius: 5px;
    transition: 0.3s;
    white-space: nowrap;
}

.menu li:hover {
    background: #5f7ee6;
    color: white;
}

.menu span {
    display: none;
}

.sidebar.expand .menu span {
    display: inline;
    margin-left: 10px;
}

/* Main Section */
.main {
    flex: 1;
    padding: 30px 40px;
}

/* Top Right Icons */
.top-bar {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 25px;
    margin-bottom: 20px;
}

.top-bar i {
    font-size: 20px;
    cursor: pointer;
    position: relative;
}

/* Profile Dropdown */
.profile-container {
    position: relative;
}

.profile-dropdown {
    position: absolute;
    top: 35px;
    right: 0;
    background: white;
    width: 180px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.15);
    border-radius: 8px;
    padding: 15px;
    display: none;
}

.profile-dropdown p {
    margin-bottom: 10px;
    font-size: 14px;
}

.logout-btn {
    background: #2e59d9;
    color: white;
    border: none;
    padding: 8px;
    width: 100%;
    border-radius: 5px;
    cursor: pointer;
}

/* Welcome */
.welcome-heading {
    text-align: center;
    font-size: 42px;
    font-weight: bold;
    margin-bottom: 40px;
    color: #2e59d9;
}

/* Cards */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <div class="toggle-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </div>

    <ul class="menu">
        <li>
            <i class="fas fa-home"></i>
            <span>Dashboard</span>
        </li>
        <li>
            <i class="fas fa-user-graduate"></i>
            <span>Faculty</span>
        </li>
    </ul>
</div>

<!-- Main -->
<div class="main">

    <!-- Top Right Icons -->
    <div class="top-bar">
        <i class="fas fa-bell"></i>

        <div class="profile-container">
            <i class="fas fa-user-circle" onclick="toggleProfile()"></i>

            <div class="profile-dropdown" id="profileMenu">
                <p><strong>Name:</strong> Admin</p>
                <p><strong>Email:</strong> admin@erascope.com</p>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>

    <h1 class="welcome-heading">Welcome to EraScope</h1>

    <div class="cards">
        <div class="card">
            <h2>120+</h2>
            <p>Total Research Papers</p>
        </div>

        <div class="card">
            <h2>35</h2>
            <p>Faculty Contributors</p>
        </div>

        <div class="card">
            <h2>15</h2>
            <p>Ongoing Projects</p>
        </div>

        <div class="card">
            <h2>8</h2>
            <p>Recent Publications</p>
        </div>
    </div>

</div>

<script>
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("expand");
}

function toggleProfile() {
    const menu = document.getElementById("profileMenu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function logout() {
    window.location.href = "login.html";
}
</script>

</body>
</html>
