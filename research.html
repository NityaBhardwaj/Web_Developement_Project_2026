<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Papers - EraScope</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #f4f6f9;
    padding: 40px;
}

h1 {
    text-align: center;
    margin-bottom: 40px;
    color: #2e59d9;
}

.subjects {
    display: flex;
    justify-content: center;
    gap: 30px;
}

.subject {
    background: white;
    padding: 20px 40px;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    cursor: pointer;
    transition: 0.3s;
}

.subject:hover {
    background: #2e59d9;
    color: white;
}

.papers {
    margin-top: 40px;
    display: none;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
}

.paper-item {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 6px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<h1>Research Subjects</h1>

<div class="subjects">
    <div class="subject" onclick="showPapers()">Computer Vision</div>
</div>

<div class="papers" id="cvPapers">
    <div class="paper-item">
        Deep Learning for Image Recognition
    </div>
    <div class="paper-item">
        Object Detection using YOLO
    </div>
    <div class="paper-item">
        Face Recognition using CNN
    </div>
</div>

<script>
function showPapers() {
    document.getElementById("cvPapers").style.display = "block";
}
</script>

</body>
</html>
